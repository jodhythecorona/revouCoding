<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">

      <!-- Top Bar -->
      <div class="topbar">
        <button class="theme-toggle" id="themeToggle">🌙 Dark Mode</button>
      </div>

      <!-- Grid Layout -->
      <div class="grid">

        <!-- ── GREETING ─────────────────────────────── -->
        <div class="card greeting-card">
          <div class="greeting-left">
            <h1 id="greetingText">Good Morning, there 👋</h1>
            <p id="greetingSubtext">Rise and shine! Let's make today count.</p>
            <div class="name-edit-area">
              <input
                type="text"
                id="nameInput"
                class="name-input"
                placeholder="Enter your name…"
                maxlength="30"
                aria-label="Your name"
              />
              <button class="btn-save-name" id="btnSaveName">Save</button>
            </div>
          </div>
          <div class="datetime">
            <div class="time" id="clockTime">00:00:00</div>
            <div class="date" id="clockDate">Monday, 1 Jan 2025</div>
          </div>
        </div>

        <!-- ── FOCUS TIMER ───────────────────────────── -->
        <div class="card">
          <h2>⏱ Focus Timer</h2>

          <div class="timer-display">
            <div class="timer-time" id="timerDisplay">25:00</div>
            <div class="timer-label" id="timerLabel">25-minute focus session</div>
          </div>

          <div class="timer-progress">
            <div class="timer-progress-bar" id="timerBar"></div>
          </div>

          <div class="timer-controls">
            <button class="btn btn-start" id="btnStart">▶ Start</button>
            <button class="btn btn-stop" id="btnStop">⏸ Pause</button>
            <button class="btn btn-reset" id="btnReset">↺ Reset</button>
          </div>

          <div class="timer-custom">
            <label for="pomoDurationInput">Set duration:</label>
            <input
              type="number"
              id="pomoDurationInput"
              min="1"
              max="120"
              value="25"
              aria-label="Pomodoro duration in minutes"
            />
            <span>min</span>
            <button id="btnApplyDuration">Apply</button>
          </div>
        </div>

        <!-- ── TO-DO LIST ────────────────────────────── -->
        <div class="card">
          <h2>✅ To-Do List</h2>

          <div class="todo-input-row">
            <input
              type="text"
              id="todoInput"
              placeholder="Add a new task…"
              maxlength="120"
              aria-label="New task"
            />
            <button id="btnAddTodo">Add</button>
          </div>

          <div class="todo-sort">
            <span>Show:</span>
            <button data-sort="all" class="active">All</button>
            <button data-sort="active">Active</button>
            <button data-sort="done">Done</button>
          </div>

          <ul class="todo-list" id="todoList">
            <!-- rendered by JS -->
          </ul>
        </div>

        <!-- ── QUICK LINKS ───────────────────────────── -->
        <div class="card" style="grid-column: 1 / -1;">
          <h2>🔗 Quick Links</h2>

          <div class="quick-links-grid" id="quickLinksGrid">
            <!-- rendered by JS -->
          </div>

          <div class="add-link-form">
            <input
              type="text"
              id="linkLabel"
              placeholder="Name (e.g. GitHub)"
              maxlength="20"
              aria-label="Link name"
            />
            <input
              type="text"
              id="linkUrl"
              placeholder="URL (e.g. github.com)"
              maxlength="200"
              aria-label="Link URL"
            />
            <input
              type="text"
              id="linkIcon"
              placeholder="Emoji icon (optional, e.g. 🐙)"
              maxlength="4"
              aria-label="Link icon emoji"
            />
            <button id="btnAddLink">+ Add Link</button>
          </div>
        </div>

      </div><!-- /grid -->
    </div><!-- /container -->

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="js/app.js"></script>
  </body>
</html>
